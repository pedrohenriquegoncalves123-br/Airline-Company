<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../CSS/cabecalho.css">
    <link rel="stylesheet" href="../CSS/css-geral.css">
    <link rel="stylesheet" href="../CSS/ingressos.css">
    <link rel="stylesheet" href="../CSS/footer.css">
    <title>Ingressos</title>
</head>

<body>
    <header id="container-menu" class="cabecalho"></header>
    <main class="conteudo-principal pad">
        <section class="sessao-ingressos sessao">
            <div class="container">
                <header class="cabeccalho-sessao">
                    <div class="faixa-mensagem">
                        <span class="icone"><svg xmlns="http://www.w3.org/2000/svg" width="" height=""
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round"
                                class="lucide lucide-globe w-4 h-4 text-[#00c8f0]">
                                <circle cx="12" cy="12" r="10"></circle>
                                <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path>
                                <path d="M2 12h20"></path>
                            </svg></span>
                        <p>REservas</p>
                    </div>
                    <h2 class="title-sessao">COMPRAR <span class="color-blue">INGRESSOS</span></h2>
                </header>
                <article class="bloco-ingressos">
                    <div class="container">
                        <form action="" method="get">
                            <fieldset class="container-form">
                                <div class="bloco-campos_items">
                                    <label for="origem" class="title-campo">
                                        <p>Origem</p>
                                    </label>
                                    <input type="text" name="origem-" id="origem" placeholder="São Paulo (GRu)">
                                    <label for="destino" class="title-campo">
                                        <p>DEstino</p>
                                    </label>
                                    <input type="text" id="destino" name="destino" placeholder="Toqui(hnd)">
                                    <label for="dtaPartida" class="title-campo">
                                        <p>data de partida</p>
                                    </label>
                                    <input type="date" id="dataPartida" name="dataPartida">
                                    <label for="passageiros" class="title-campo">
                                        <p>Passageiros</p>
                                    </label>
                                    <input type="number" id="pasageiros" name="passageiros">
                                </div>
                                <div class="btn__buscar-voos">
                                    <button type="submit">
                                        <p>Buscar Voos</p>
                                    </button>
                                </div>
                            </fieldset>
                        </form>
                    </div>
                </article>
            </div>
        </section>
    </main>
    <script src="../js/cabecalho.js"></script>
</body>

</html>
